<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebView Demo</title>
  <script src="./index.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="title">WebView PostMessage 测试</div>
  <div class="subtitle">通过 JSSDK 向小程序发送追问消息</div>

  <div class="input-wrapper">
    <label for="msg">消息文本 (text)</label>
    <textarea id="msg" placeholder="例如: 选择拿铁">选择拿铁</textarea>
  </div>

  <div class="input-wrapper">
    <label for="apiName">API 名称 (api/call name)</label>
    <input class="api-input" id="apiName" type="text" placeholder="例如: selectGoods" value="selectGoods" />
  </div>

  <div class="input-wrapper">
    <label for="apiArgs">API 参数 (arguments, JSON格式)</label>
    <textarea id="apiArgs" placeholder='例如: {"key": "value"}'>{"key": "value"}</textarea>
  </div>

  <button class="btn" id="sendBtn">发送消息到小程序</button>
  <button class="btn" id="reapplyBtn">发送 reapply 到小程序</button>
  <div class="status" id="status"></div>

  <script>
    var sendBtn = document.getElementById('sendBtn');
    var msgInput = document.getElementById('msg');
    var apiNameInput = document.getElementById('apiName');
    var apiArgsInput = document.getElementById('apiArgs');
    var statusEl = document.getElementById('status');

    sendBtn.addEventListener('click', function () {
      var message = msgInput.value.trim();
      var apiName = apiNameInput.value.trim();
      var apiArgsRaw = apiArgsInput.value.trim();

      if (!message) {
        statusEl.textContent = '请输入消息文本';
        return;
      }

      var apiArgs = {};
      if (apiArgsRaw) {
        try {
          apiArgs = JSON.parse(apiArgsRaw);
        } catch (e) {
          statusEl.textContent = '❌ arguments JSON 格式错误';
          return;
        }
      }

      try {
        WeixinJSBridge.invoke('invokeMiniProgramAPI', {
          name: 'sendFollowUpMessage',
          arg: {
            content: [
              {
                type: 'text',
                text: message,
              },
              {
                type: 'api/call',
                data: {
                  name: apiName,
                  arguments: apiArgs
                }
              }
            ],
          }
        });
      } catch (e) {
        throw new Error('发送失败');
      }

      statusEl.textContent = '✅ 已发送，正在返回小程序...';

    });

    reapplyBtn.addEventListener('click', function () {
      var apiName = apiNameInput.value.trim();
      var apiArgsRaw = apiArgsInput.value.trim();

      var apiArgs = {};
      if (apiArgsRaw) {
        try {
          apiArgs = JSON.parse(apiArgsRaw);
        } catch (e) {
          statusEl.textContent = '❌ arguments JSON 格式错误';
          return;
        }
      }

      try {
        WeixinJSBridge.invoke('invokeMiniProgramAPI', {
          name: 'reapplyApiCall',
          arg: {
            arguments: apiArgs
          }
        });
      } catch (e) {
        throw new Error('发送失败');
      }

      statusEl.textContent = '✅ 已发送，正在返回小程序...';
    });
  </script>
</body>

</html>
